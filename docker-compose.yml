# ============================================================
# VLM Document Linker Stack
#
# Usage:
#   Start dashboard:    docker compose up -d web
#   Start models:       docker compose --profile models up -d
#   Start worker:       docker compose --profile worker up -d
#   Enqueue files:      docker compose --profile jobs run enqueuer
#   Export CSV:         docker compose --profile jobs run exporter
#   Full stack:         docker compose --profile models --profile worker up -d
#
# GPU index reference:
#   0: RTX 3080 10GB  (GPU-884b504f-a5ab-e9d7-b85b-799874db3fd8)
#   1: RTX 3060 Ti 8GB (GPU-8487b266-25c9-3369-8894-d94a07344f17)
#   2: RTX 3060 Ti 8GB (GPU-d9f2c052-9dcb-15db-2e3a-889b7a8bd5fb)
#   3: RTX 3060 Ti 8GB (GPU-50b74d27-cfe4-571c-65b0-9ff9b344cb18)
# ============================================================

services:

  # ----------------------------------------------------------
  # REDIS -- shared queue and results store
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vdl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------
  # OLLAMA-GPU0 -- RTX 3080 10GB
  # Serves: qwen3-vl:2b (1.9GB)
  # Profile: models
  # ----------------------------------------------------------
  ollama-gpu0:
    image: ollama/ollama:latest
    container_name: vdl-ollama-gpu0
    profiles: ["models"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-884b504f-a5ab-e9d7-b85b-799874db3fd8
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # OLLAMA-GPU1 -- RTX 3060 Ti 8GB
  # Serves: glm-ocr (2.2GB)
  # Profile: models
  # ----------------------------------------------------------
  ollama-gpu1:
    image: ollama/ollama:latest
    container_name: vdl-ollama-gpu1
    profiles: ["models"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-8487b266-25c9-3369-8894-d94a07344f17
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # OLLAMA-MULTI -- 3x RTX 3060 Ti (24GB combined)
  # For running larger models split across GPUs
  # Profile: models
  # ----------------------------------------------------------
  ollama-multi:
    image: ollama/ollama:latest
    container_name: vdl-ollama-multi
    profiles: ["models"]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=GPU-8487b266-25c9-3369-8894-d94a07344f17,GPU-d9f2c052-9dcb-15db-2e3a-889b7a8bd5fb,GPU-50b74d27-cfe4-571c-65b0-9ff9b344cb18
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "11436:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # MODEL PULLS -- one-shot init to pull models on each GPU
  # Runs once, then exits. Safe to re-run.
  # Commented out: models already downloaded, shared via ollama-data volume
  # ----------------------------------------------------------
  # ollama-pull-gpu0:
  #   image: ollama/ollama:latest
  #   container_name: vdl-ollama-pull-gpu0
  #   profiles: ["models"]
  #   depends_on:
  #     ollama-gpu0:
  #       condition: service_healthy
  #   entrypoint: ["sh", "-c", "ollama pull qwen3-vl:2b"]
  #   environment:
  #     - OLLAMA_HOST=ollama-gpu0:11434
  #   restart: "no"

  # ollama-pull-gpu1:
  #   image: ollama/ollama:latest
  #   container_name: vdl-ollama-pull-gpu1
  #   profiles: ["models"]
  #   depends_on:
  #     ollama-gpu1:
  #       condition: service_healthy
  #   entrypoint: ["sh", "-c", "ollama pull glm-ocr"]
  #   environment:
  #     - OLLAMA_HOST=ollama-gpu1:11434
  #   restart: "no"

  # ----------------------------------------------------------
  # ENQUEUER -- scans /input, pushes files into Redis queue
  # Run once then exits
  # ----------------------------------------------------------
  enqueuer:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vdl-enqueuer
    profiles: ["jobs"]
    command: python enqueue.py
    environment:
      - REDIS_HOST=redis
      - INPUT_DIR=/input
    volumes:
      - ./input:/input:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------
  # WORKER -- unified pipeline worker
  # Pulls from queue, runs each file through all pipeline models,
  # performs triage, stores results
  # ----------------------------------------------------------
  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vdl-worker
    profiles: ["worker"]
    command: python worker.py
    environment:
      - REDIS_HOST=redis
      - QUEUE_NAME=queue:pending
      - WORKER_ID=pipeline
      - OUTPUT_DIR=/output
      - AUTO_ACCEPT_THRESHOLD=0.85
    volumes:
      - ./input:/input:ro
      - ./output:/output
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # EXPORTER -- dumps Redis results to CSV
  # ----------------------------------------------------------
  exporter:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vdl-exporter
    profiles: ["jobs"]
    command: python export.py
    environment:
      - REDIS_HOST=redis
      - OUTPUT_DIR=/output
    volumes:
      - ./output:/output
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------
  # WEB DASHBOARD -- live view of queue, results, timing, review
  # Always on (no profile needed), accessible at :5000
  # ----------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vdl-web
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - INPUT_DIR=/input
      - OLLAMA_ENDPOINTS=http://ollama-gpu0:11434,http://ollama-gpu1:11434,http://ollama-multi:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./input:/input:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  ollama-data:  # Shared Ollama model cache
