<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLM Document Linker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --orange: #fb923c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  .header-actions a {
    color: var(--blue);
    text-decoration: none;
    font-size: 13px;
  }

  .refresh-info { color: var(--text-dim); font-size: 13px; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Stat cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }

  .stat-card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .value.green { color: var(--green); }
  .value.red { color: var(--red); }
  .value.yellow { color: var(--yellow); }
  .value.blue { color: var(--blue); }
  .value.purple { color: var(--purple); }
  .value.cyan { color: var(--cyan); }
  .value.orange { color: var(--orange); }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-header h2 { font-size: 16px; font-weight: 600; }

  .panel-body {
    padding: 16px 20px;
    max-height: 400px;
    overflow-y: auto;
  }

  /* Results table */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .results-table th {
    text-align: left;
    padding: 10px 16px;
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
  }

  .results-table td {
    padding: 9px 16px;
    border-top: 1px solid var(--border);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .results-table tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-ok { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-review { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-reviewed { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-fail { background: rgba(248,113,113,0.15); color: var(--red); }

  .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; }

  .clickable {
    color: var(--blue);
    cursor: pointer;
    text-decoration: none;
  }

  .clickable:hover { text-decoration: underline; }

  /* Queue items */
  .queue-item, .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .queue-item:last-child, .list-item:last-child { border-bottom: none; }

  .empty-msg {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  /* Container controls */
  .container-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .container-row:last-child { border-bottom: none; }
  .container-name { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; }

  .container-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin: 0 12px;
  }

  .status-running { background: rgba(52,211,153,0.15); color: var(--green); }
  .status-exited { background: rgba(248,113,113,0.15); color: var(--red); }
  .status-other { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .container-actions { display: flex; gap: 6px; }

  /* Pipeline config */
  .pipeline-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .pipeline-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .pipeline-card:hover { border-color: var(--blue); }

  .pipeline-card .pipeline-order {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: rgba(96,165,250,0.15);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pipeline-card .pipeline-info { flex: 1; min-width: 0; }

  .pipeline-card .pipeline-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pipeline-card .pipeline-url {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pipeline-card .pipeline-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .pipeline-card .pipeline-actions .btn {
    width: 28px;
    height: 28px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border-radius: 6px;
  }

  .pipeline-empty {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 13px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
  }

  .available-models-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .available-model-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .available-model-card:hover {
    border-color: var(--green);
    background: rgba(52,211,153,0.05);
  }

  .available-model-card .model-name {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .available-model-card .model-size {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .pipeline-divider {
    border-top: 1px solid var(--border);
    margin: 16px 0;
    padding-top: 16px;
  }

  .model-family {
    margin-bottom: 12px;
  }

  .model-family-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--purple);
    margin-bottom: 6px;
    padding-left: 2px;
  }

  .model-family-variants {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .available-model-card .model-tag {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  .gpu-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    padding: 2px 4px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .gpu-select:focus { outline: 1px solid var(--blue); }

  .model-family-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  /* Model stats grid */
  .model-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .model-stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .model-stat-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--blue);
  }

  .model-stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    color: var(--text-dim);
  }

  .model-stat-row .val { color: var(--text); font-weight: 500; }

  /* Buttons */
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--border); }

  .btn-danger { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .btn-danger:hover { background: rgba(248,113,113,0.15); }

  .btn-primary { border-color: rgba(96,165,250,0.3); color: var(--blue); }
  .btn-primary:hover { background: rgba(96,165,250,0.15); }

  .btn-sm { padding: 3px 8px; font-size: 11px; }

  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90vw;
    max-width: 1100px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h2 { font-size: 16px; font-weight: 600; }

  .modal-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .modal-image {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    background: var(--bg);
  }

  .modal-image img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin: 0 auto; }

  .modal-details {
    width: 380px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  .modal-details h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .modal-details h3:first-child { margin-top: 0; }

  .pass-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .pass-card .pass-model { font-weight: 600; font-size: 13px; margin-bottom: 6px; }

  .pass-card .pass-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
    color: var(--text-dim);
  }

  .pass-card .pass-row .val { color: var(--text); }

  .page-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-align: center;
    padding: 10px 0 4px;
  }

  .page-label:first-child { padding-top: 0; }


  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
  }

  .pulse { animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>VLM Document Linker</h1>
  <div class="header-actions">
    <a href="/test">Model Test</a>
    <a href="/review">Review Queue</a>
    <span class="refresh-info" id="lastUpdate">--</span>
    <button class="btn" onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading"><span class="pulse">Loading dashboard...</span></div>
  <div id="app" style="display:none;">

    <!-- Top-level stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Model stats -->
    <div class="model-stats-grid" id="modelStatsGrid"></div>

    <!-- Pipeline Config -->
    <div class="panel">
      <div class="panel-header">
        <h2>Pipeline Config</h2>
        <button class="btn btn-primary btn-sm" onclick="savePipeline()">Save Pipeline</button>
      </div>
      <div class="panel-body" id="pipelineBody">
        <div class="empty-msg">Loading...</div>
      </div>
    </div>

    <!-- Queue -->
    <div class="panel">
      <div class="panel-header">
        <h2>Pending Queue (<span id="queueCount">0</span>)</h2>
        <button class="btn btn-danger btn-sm" onclick="clearQueue()">Clear Queue</button>
      </div>
      <div class="panel-body" id="queueBody"></div>
    </div>

    <!-- Processing -->
    <div class="panel" id="processingPanel" style="display:none;">
      <div class="panel-header">
        <h2>Currently Processing (<span id="processingCount">0</span>)</h2>
      </div>
      <div class="panel-body" id="processingBody"></div>
    </div>

    <!-- Files table -->
    <div class="panel">
      <div class="panel-header">
        <h2>All Files</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" onclick="requeueFailed()">Retry Errors</button>
        </div>
      </div>
      <div class="panel-body" style="max-height:600px;">
        <table class="results-table" id="filesTable">
          <thead><tr>
            <th>File</th>
            <th>Status</th>
            <th>Final Value</th>
            <th>Passes</th>
            <th>Time</th>
            <th>Confidence</th>
            <th>Tokens</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="filesBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Services -->
    <div class="panel">
      <div class="panel-header">
        <h2>Services</h2>
      </div>
      <div class="panel-body" id="containersBody">
        <div class="empty-msg">Loading...</div>
      </div>
    </div>

    <!-- Redis Keys -->
    <div class="panel">
      <div class="panel-header">
        <h2>Redis Keys</h2>
        <button class="btn btn-danger btn-sm" onclick="deleteAllKeys()">Delete All (Full Reset)</button>
      </div>
      <div class="panel-body" id="keysBody">
        <div class="empty-msg">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- File Detail Modal -->
<div class="modal-overlay" id="fileModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">File Detail</h2>
      <button class="btn btn-sm" onclick="closeModal()">Close</button>
    </div>
    <div class="modal-body">
      <div class="modal-image" id="modalImageContainer"></div>
      <div class="modal-details" id="modalDetails"></div>
    </div>
  </div>
</div>

<script>
let data = null;
let pipelineConfig = [];
let availableModels = [];
let ollamaEndpoints = [];

async function refresh() {
  try {
    const resp = await fetch('/api/status');
    data = await resp.json();
    render();
    document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function render() {
  renderStats();
  renderModelStats();
  renderProcessing();
  renderQueue();
  renderFiles();
  renderContainers();
  renderKeys();
  renderPipeline();
}

function renderStats() {
  const cards = [
    { label: 'Queue Pending', value: data.queue_pending, cls: data.queue_pending > 0 ? 'yellow' : 'green', sub: data.queue_pending > 0 ? 'Waiting' : 'Idle' },
    { label: 'Processing', value: data.processing_count || 0, cls: (data.processing_count || 0) > 0 ? 'cyan' : 'green', sub: (data.processing_count || 0) > 0 ? 'In flight' : 'Idle' },
    { label: 'Total Files', value: data.total_files, cls: 'blue', sub: 'Processed' },
    { label: 'Auto Accepted', value: data.auto_accepted, cls: 'green', sub: 'High confidence consensus' },
    { label: 'Needs Review', value: data.needs_review, cls: data.needs_review > 0 ? 'yellow' : 'green', sub: data.needs_review > 0 ? 'Click Review Queue' : 'All clear' },
    { label: 'Reviewed', value: data.reviewed, cls: 'blue', sub: 'Manually verified' },
    { label: 'Errors', value: data.errored, cls: data.errored > 0 ? 'red' : 'green', sub: data.errored > 0 ? 'Check below' : 'None' },
  ];

  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join('');
}

function renderModelStats() {
  const grid = document.getElementById('modelStatsGrid');
  const stats = data.model_stats;

  if (!stats || Object.keys(stats).length === 0) {
    grid.innerHTML = '';
    return;
  }

  grid.innerHTML = Object.entries(stats).map(([model, s]) => {
    const avgPrompt = s.succeeded > 0 ? Math.round(s.total_prompt_tokens / s.succeeded) : 0;
    const avgCompletion = s.succeeded > 0 ? Math.round(s.total_completion_tokens / s.succeeded) : 0;
    return `
    <div class="model-stat-card">
      <h3>${model}</h3>
      <div class="model-stat-row"><span>Total passes</span><span class="val">${s.total}</span></div>
      <div class="model-stat-row"><span>Succeeded</span><span class="val" style="color:var(--green)">${s.succeeded}</span></div>
      <div class="model-stat-row"><span>Failed</span><span class="val" style="color:var(--red)">${s.failed}</span></div>
      <div class="model-stat-row"><span>Avg time</span><span class="val">${s.avg_time}s</span></div>
      <div class="model-stat-row"><span>Avg confidence</span><span class="val">${s.avg_confidence}</span></div>
      <div class="model-stat-row" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px;"><span>Total tokens</span><span class="val">${s.total_tokens.toLocaleString()}</span></div>
      <div class="model-stat-row"><span>Avg prompt tokens</span><span class="val">${avgPrompt.toLocaleString()}</span></div>
      <div class="model-stat-row"><span>Avg completion tokens</span><span class="val">${avgCompletion.toLocaleString()}</span></div>
    </div>`;
  }).join('');
}

function renderProcessing() {
  const panel = document.getElementById('processingPanel');
  const body = document.getElementById('processingBody');
  const items = data.processing || [];
  document.getElementById('processingCount').textContent = items.length;

  if (items.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = '';
  body.innerHTML = items.map(p => {
    const elapsed = p.started_at ? Math.round((Date.now() - new Date(p.started_at).getTime()) / 1000) : 0;
    return `<div class="queue-item">
      <span class="mono">${p.filename}</span>
      <span style="color:var(--text-dim);font-size:12px;">worker: ${p.worker} &middot; ${elapsed}s elapsed</span>
    </div>`;
  }).join('');
}

function renderQueue() {
  document.getElementById('queueCount').textContent = data.queue_pending;
  const body = document.getElementById('queueBody');

  if (!data.queue_items || data.queue_items.length === 0) {
    body.innerHTML = '<div class="empty-msg">Queue is empty</div>';
    return;
  }

  body.innerHTML = data.queue_items.map(item => {
    const name = item.split('/').pop();
    return `<div class="queue-item">
      <span class="clickable" onclick="openFileModal('${item.replace(/'/g, "\\'")}')" title="${item}">${name}</span>
      <button class="btn btn-danger btn-sm" onclick="removeFromQueue('${item.replace(/'/g, "\\'")}')">Remove</button>
    </div>`;
  }).join('');
}

function statusBadge(status) {
  const map = {
    'auto_accepted': '<span class="badge badge-ok">AUTO ACCEPTED</span>',
    'needs_review': '<span class="badge badge-review">NEEDS REVIEW</span>',
    'reviewed': '<span class="badge badge-reviewed">REVIEWED</span>',
    'error': '<span class="badge badge-fail">ERROR</span>',
  };
  return map[status] || `<span class="badge">${status}</span>`;
}

function renderFiles() {
  const body = document.getElementById('filesBody');

  if (!data.files || data.files.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="empty-msg">No files processed yet</td></tr>';
    return;
  }

  body.innerHTML = data.files.map(f => {
    const passCount = (f.passes || []).length;
    const passErrors = (f.passes || []).filter(p => p.error).length;
    const passSummary = passErrors > 0 ? `${passCount} (${passErrors} failed)` : `${passCount}`;
    const path = (f.path || f._key || '').replace(/'/g, "\\'");

    return `<tr>
      <td><span class="clickable" onclick="openFileModal('${path}')" title="${f.path || ''}">${f.original_filename || '-'}</span></td>
      <td>${statusBadge(f.status)}</td>
      <td class="mono">${f.final_value || '-'}</td>
      <td>${passSummary}</td>
      <td class="mono" style="font-size:12px">${(() => {
        const passes = f.passes || [];
        const total = passes.reduce((sum, p) => sum + (p.inference_seconds || 0), 0);
        return total > 0 ? total.toFixed(1) + 's' : '-';
      })()}</td>
      <td class="mono" style="font-size:12px">${(() => {
        const passes = f.passes || [];
        const confs = passes.filter(p => !p.error && p.confidence != null).map(p => p.confidence);
        if (confs.length === 0) return '-';
        const avg = confs.reduce((a, b) => a + b, 0) / confs.length;
        return avg.toFixed(2);
      })()}</td>
      <td class="mono" style="font-size:12px">${(() => {
        const passes = f.passes || [];
        const total = passes.reduce((sum, p) => sum + (p.completion_tokens || 0), 0);
        return total > 0 ? total.toLocaleString() : '-';
      })()}</td>
      <td>
        <button class="btn btn-sm" onclick="requeueFile('${path}')">Re-run</button>
      </td>
    </tr>`;
  }).join('');
}

async function fetchPipeline() {
  try {
    const [pipeResp, modelsResp] = await Promise.all([
      fetch('/api/pipeline'),
      fetch('/api/pipeline/models'),
    ]);
    const pipeData = await pipeResp.json();
    const modelsData = await modelsResp.json();
    pipelineConfig = pipeData.pipeline || [];
    availableModels = modelsData.models || [];
    ollamaEndpoints = modelsData.endpoints || [];
  } catch (e) {
    console.error('Pipeline fetch error:', e);
  }
}

function renderPipeline() {
  const body = document.getElementById('pipelineBody');
  let html = '';

  // Active pipeline
  html += '<div class="pipeline-section-label">Active Pipeline</div>';

  if (pipelineConfig.length > 0) {
    html += pipelineConfig.map((m, i) => `
      <div class="pipeline-card">
        <div class="pipeline-order">${i + 1}</div>
        <div class="pipeline-info">
          <div class="pipeline-name">${m.label || m.name}</div>
          <div class="pipeline-url">${m.base_url}</div>
        </div>
        <div class="pipeline-actions">
          <button class="btn" onclick="movePipelineModel(${i}, -1)" ${i === 0 ? 'disabled' : ''} title="Move up">&#x25B2;</button>
          <button class="btn" onclick="movePipelineModel(${i}, 1)" ${i === pipelineConfig.length - 1 ? 'disabled' : ''} title="Move down">&#x25BC;</button>
          <button class="btn btn-danger" onclick="removePipelineModel(${i})" title="Remove">&#x2715;</button>
        </div>
      </div>
    `).join('');
  } else {
    html += '<div class="pipeline-empty">No models in pipeline — add one below</div>';
  }

  // Available models
  html += '<div class="pipeline-divider"></div>';
  html += '<div class="pipeline-section-label">Available Models</div>';

  if (availableModels.length > 0) {
    // GPU service selector
    const endpointOptions = ollamaEndpoints.map(ep =>
      `<option value="${ep.base_url}">${ep.label}</option>`
    ).join('');
    html += `<div style="margin-bottom:12px;">
      <label style="font-size:12px;color:var(--text-dim);margin-right:8px;">GPU Service:</label>
      <select class="gpu-select" id="gpu-select-global">${endpointOptions}</select>
    </div>`;

    // Filter out models already in pipeline
    const pipelineNames = new Set(pipelineConfig.map(m => m.name));
    const available = availableModels.filter(m => !pipelineNames.has(m.name));

    if (available.length > 0) {
      // Group by model family (e.g. "qwen3-vl:2b" -> "qwen3-vl")
      const families = {};
      available.forEach(m => {
        const family = m.name.split(':')[0];
        if (!families[family]) families[family] = [];
        families[family].push(m);
      });

      // Sort models within each family by size
      Object.values(families).forEach(models => {
        models.sort((a, b) => (a.size || 0) - (b.size || 0));
      });

      // Sort families alphabetically
      const sortedFamilies = Object.keys(families).sort();

      sortedFamilies.forEach(family => {
        html += `<div class="model-family">
          <div class="model-family-header">
            <div class="model-family-name">${family}</div>
          </div>
          <div class="model-family-variants">`;
        html += families[family].map(m => {
          const tag = m.name.split(':')[1] || 'latest';
          const sizeStr = m.size ? (m.size / 1e9).toFixed(1) + ' GB' : '';
          return `<div class="available-model-card" onclick="addModelFromGlobal('${m.name}')">
            <span class="model-tag">${tag}</span>
            <span class="model-size">${sizeStr}</span>
          </div>`;
        }).join('');
        html += '</div></div>';
      });
    } else {
      html += '<div class="pipeline-empty">All available models are in the pipeline</div>';
    }
  } else {
    html += '<div class="pipeline-empty">No Ollama models found — is Ollama running?</div>';
  }

  body.innerHTML = html;
}

function addPipelineModel(name, baseUrl, label) {
  pipelineConfig.push({ name, base_url: baseUrl, label });
  renderPipeline();
}

function addModelWithGpu(name, selectId) {
  const select = document.getElementById(selectId);
  const baseUrl = select.value;
  pipelineConfig.push({ name, base_url: baseUrl, label: name });
  renderPipeline();
}

function addModelFromGlobal(name) {
  const select = document.getElementById('gpu-select-global');
  const baseUrl = select.value;
  pipelineConfig.push({ name, base_url: baseUrl, label: name });
  renderPipeline();
}

function removePipelineModel(index) {
  pipelineConfig.splice(index, 1);
  renderPipeline();
}

function movePipelineModel(index, direction) {
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= pipelineConfig.length) return;
  const item = pipelineConfig.splice(index, 1)[0];
  pipelineConfig.splice(newIndex, 0, item);
  renderPipeline();
}

async function savePipeline() {
  await fetch('/api/pipeline', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pipeline: pipelineConfig }),
  });
  alert('Pipeline saved. New files will use this config.');
}

// -- File Modal --

async function openFileModal(path) {
  const modal = document.getElementById('fileModal');
  const container = document.getElementById('modalImageContainer');
  const details = document.getElementById('modalDetails');
  const title = document.getElementById('modalTitle');

  title.textContent = path.split('/').pop();
  container.innerHTML = '<div class="empty-msg">Loading...</div>';
  details.innerHTML = '<div class="empty-msg">Loading...</div>';
  modal.classList.add('active');

  // Fetch page count and render all pages
  let totalPages = 1;
  try {
    const infoResp = await fetch('/api/file-info?path=' + encodeURIComponent(path));
    if (infoResp.ok) {
      const info = await infoResp.json();
      totalPages = info.pages || 1;
    }
  } catch (e) {
    console.error('File info error:', e);
  }

  let imagesHtml = '';
  for (let i = 0; i < totalPages; i++) {
    if (totalPages > 1) {
      imagesHtml += `<div class="page-label">Page ${i + 1} of ${totalPages}</div>`;
    }
    imagesHtml += `<img src="/api/file-image?path=${encodeURIComponent(path)}&page=${i}" alt="Page ${i + 1}">`;
  }
  container.innerHTML = imagesHtml;

  try {
    const resp = await fetch('/api/file-detail?path=' + encodeURIComponent(path));
    if (!resp.ok) {
      details.innerHTML = '<div class="empty-msg">No data yet (file may still be in queue)</div>';
      return;
    }
    const file = await resp.json();

    let html = '';
    html += `<h3>Status</h3>`;
    html += `<div style="margin-bottom:8px;">${statusBadge(file.status)}</div>`;
    html += `<div style="font-size:13px;margin-bottom:4px;">Final value: <strong class="mono">${file.final_value || 'none'}</strong></div>`;

    if (file.reviewed_by) {
      html += `<div style="font-size:12px;color:var(--text-dim);">Reviewed by: ${file.reviewed_by}</div>`;
    }

    html += `<h3>Passes (${(file.passes || []).length})</h3>`;

    (file.passes || []).forEach((p, i) => {
      html += `<div class="pass-card">
        <div class="pass-model">${p.model}${p.page != null ? ' (page ' + (p.page + 1) + ')' : ''}</div>
        <div class="pass-row"><span>Certificate #</span><span class="val mono">${p.certificate_number || 'null'}</span></div>
        <div class="pass-row"><span>Found</span><span class="val">${p.found != null ? p.found : '-'}</span></div>
        <div class="pass-row"><span>Confidence</span><span class="val">${p.confidence != null ? p.confidence : '-'}</span></div>
        <div class="pass-row"><span>Time</span><span class="val">${p.inference_seconds != null ? p.inference_seconds + 's' : '-'}</span></div>
        <div class="pass-row"><span>Prompt tokens</span><span class="val">${p.prompt_tokens ? p.prompt_tokens.toLocaleString() : '-'}</span></div>
        <div class="pass-row"><span>Completion tokens</span><span class="val">${p.completion_tokens ? p.completion_tokens.toLocaleString() : '-'}</span></div>
        <div class="pass-row"><span>Total tokens</span><span class="val">${p.total_tokens ? p.total_tokens.toLocaleString() : '-'}</span></div>
        ${p.error ? `<div class="pass-row"><span>Error</span><span class="val" style="color:var(--red)">${p.error}</span></div>` : ''}
      </div>`;
    });

    html += `<h3>Actions</h3>`;
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;">`;
    html += `<button class="btn btn-sm" onclick="requeueFile('${file.path.replace(/'/g, "\\'")}');closeModal();">Re-run</button>`;
    if (file.status === 'needs_review') {
      html += `<a href="/review" class="btn btn-primary btn-sm" style="text-decoration:none;">Go to Review</a>`;
    }
    html += `</div>`;

    details.innerHTML = html;
  } catch (e) {
    details.innerHTML = '<div class="empty-msg">Error loading file data</div>';
  }
}

function closeModal() {
  document.getElementById('fileModal').classList.remove('active');
}

document.getElementById('fileModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// -- Containers --

async function renderContainers() {
  try {
    const resp = await fetch('/api/containers');
    const result = await resp.json();
    const body = document.getElementById('containersBody');

    body.innerHTML = result.containers.map(c => {
      const statusCls = c.status === 'running' ? 'status-running'
        : c.status === 'exited' ? 'status-exited' : 'status-other';
      const notCreated = c.status === 'not created';

      return `<div class="container-row">
        <span class="container-name">${c.name}</span>
        <span class="container-status ${statusCls}">${c.status}</span>
        <div class="container-actions">
          <button class="btn btn-sm" onclick="containerAction('start', '${c.name}')" ${c.running || notCreated ? 'disabled' : ''}>Start</button>
          <button class="btn btn-sm btn-danger" onclick="containerAction('stop', '${c.name}')" ${!c.running ? 'disabled' : ''}>Stop</button>
          <button class="btn btn-sm" onclick="containerAction('restart', '${c.name}')" ${notCreated ? 'disabled' : ''}>Restart</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('Containers fetch error:', e);
  }
}

async function containerAction(action, name) {
  try {
    const resp = await fetch(`/api/containers/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const result = await resp.json();
    if (result.error) alert(result.error);
    refresh();
  } catch (e) {
    console.error('Container action error:', e);
  }
}

// -- Redis Keys --

async function renderKeys() {
  try {
    const resp = await fetch('/api/keys');
    const result = await resp.json();
    const body = document.getElementById('keysBody');

    body.innerHTML = result.keys.map(k => `
      <div class="list-item">
        <span class="mono">${k.key}</span>
        <span style="color:var(--text-dim);font-size:12px;">${k.type} &middot; ${k.size} entries</span>
        <button class="btn btn-danger btn-sm" onclick="deleteKey('${k.key}')" ${k.size === 0 ? 'disabled' : ''}>Delete</button>
      </div>
    `).join('');
  } catch (e) {
    console.error('Keys fetch error:', e);
  }
}

// -- Actions --

async function clearQueue() {
  if (!confirm('Clear all pending queue items?')) return;
  await fetch('/api/queue/clear', { method: 'POST' });
  refresh();
}

async function removeFromQueue(item) {
  await fetch('/api/queue/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ item }),
  });
  refresh();
}

async function requeueFailed() {
  const resp = await fetch('/api/requeue-failed', { method: 'POST' });
  const result = await resp.json();
  alert(`Requeued ${result.requeued} errored items`);
  refresh();
}

async function requeueFile(path) {
  await fetch('/api/requeue-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path }),
  });
  refresh();
}

async function deleteKey(key) {
  if (!confirm(`Delete "${key}"? This cannot be undone.`)) return;
  await fetch('/api/keys/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key }),
  });
  refresh();
}

async function deleteAllKeys() {
  if (!confirm('Delete ALL Redis keys? This is a full reset and cannot be undone.')) return;
  await fetch('/api/keys/delete-all', { method: 'POST' });
  refresh();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Initial load + auto-refresh every 5s
fetchPipeline().then(() => refresh());
setInterval(refresh, 5000);
</script>
