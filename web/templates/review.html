<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Bench - Review Queue</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --cyan: #22d3ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  .header-actions a {
    color: var(--blue);
    text-decoration: none;
    font-size: 13px;
  }

  .review-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* File list sidebar */
  .file-list {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
  }

  .file-list-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .file-list-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-list-item:hover { background: var(--surface2); }
  .file-list-item.active { background: var(--surface2); border-left: 3px solid var(--blue); }

  .file-list-item .file-name { display: block; font-weight: 500; }
  .file-list-item .file-status {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 4px;
    background: rgba(251,191,36,0.15);
    color: var(--yellow);
    font-weight: 600;
  }

  /* Main review area */
  .review-main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .review-image {
    flex: 1;
    padding: 20px;
    overflow: auto;
    background: var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .review-image img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
  }

  /* Review panel (right side) */
  .review-panel {
    width: 400px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .review-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .review-section h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* Pass cards */
  .pass-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .pass-card:hover { border-color: var(--blue); }
  .pass-card.selected { border-color: var(--green); background: rgba(52,211,153,0.05); }

  .pass-card .pass-model {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pass-card .pass-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
    color: var(--text-dim);
  }

  .pass-card .pass-row .val { color: var(--text); }

  .pass-card .select-indicator {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }

  /* Decision area */
  .decision-area {
    padding: 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .decision-area h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .decision-input {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .decision-input input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  .decision-input input:focus {
    outline: none;
    border-color: var(--blue);
  }

  .decision-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--border); }

  .btn-success {
    border-color: rgba(52,211,153,0.3);
    color: var(--green);
    background: rgba(52,211,153,0.1);
  }

  .btn-success:hover { background: rgba(52,211,153,0.2); }

  .btn-danger { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .btn-danger:hover { background: rgba(248,113,113,0.15); }

  .btn-primary { border-color: rgba(96,165,250,0.3); color: var(--blue); }
  .btn-primary:hover { background: rgba(96,165,250,0.15); }

  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-lg { padding: 10px 20px; font-size: 14px; font-weight: 600; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-dim);
    font-size: 15px;
    padding: 40px;
    text-align: center;
  }

  .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }

  .nav-buttons {
    display: flex;
    gap: 8px;
  }

  .review-counter {
    color: var(--text-dim);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Review Queue</h1>
  <div class="header-actions">
    <span class="review-counter" id="reviewCounter">--</span>
    <div class="nav-buttons">
      <button class="btn btn-sm" onclick="prevFile()">Prev</button>
      <button class="btn btn-sm" onclick="nextFile()">Next</button>
    </div>
    <a href="/">Dashboard</a>
  </div>
</div>

<div class="review-layout">
  <!-- File list -->
  <div class="file-list">
    <div class="file-list-header">Files to Review</div>
    <div id="fileList"></div>
  </div>

  <!-- Main content -->
  <div id="reviewContent" class="review-main">
    <div class="empty-state">Select a file from the list to begin review</div>
  </div>
</div>

<script>
let reviewFiles = [];
let currentIndex = -1;
let selectedPassValue = null;

async function loadReviewQueue() {
  try {
    const resp = await fetch('/api/review-queue');
    const data = await resp.json();
    reviewFiles = data.files || [];
    renderFileList();
    updateCounter();

    if (reviewFiles.length > 0 && currentIndex === -1) {
      selectFile(0);
    }
  } catch (e) {
    console.error('Failed to load review queue:', e);
  }
}

function updateCounter() {
  document.getElementById('reviewCounter').textContent =
    reviewFiles.length > 0 ? `${currentIndex + 1} / ${reviewFiles.length}` : 'No files to review';
}

function renderFileList() {
  const list = document.getElementById('fileList');

  if (reviewFiles.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px;">All clear! No files need review.</div>';
    return;
  }

  list.innerHTML = reviewFiles.map((f, i) => `
    <div class="file-list-item ${i === currentIndex ? 'active' : ''}" onclick="selectFile(${i})">
      <span class="file-name">${f.original_filename}</span>
      <span class="file-status">NEEDS REVIEW</span>
    </div>
  `).join('');
}

function selectFile(index) {
  currentIndex = index;
  selectedPassValue = null;
  renderFileList();
  updateCounter();
  renderReview();
}

function prevFile() {
  if (currentIndex > 0) selectFile(currentIndex - 1);
}

function nextFile() {
  if (currentIndex < reviewFiles.length - 1) selectFile(currentIndex + 1);
}

function renderReview() {
  const container = document.getElementById('reviewContent');
  const file = reviewFiles[currentIndex];

  if (!file) {
    container.innerHTML = '<div class="empty-state">Select a file from the list to begin review</div>';
    return;
  }

  const imgUrl = '/api/file-image?path=' + encodeURIComponent(file.path);
  const passes = file.passes || [];

  // Collect unique values from passes for quick-select
  const uniqueValues = [...new Set(
    passes.filter(p => p.license_number && !p.error).map(p => p.license_number)
  )];

  container.innerHTML = `
    <div class="review-image">
      <img src="${imgUrl}" alt="${file.original_filename}">
    </div>
    <div class="review-panel">
      <div class="review-section">
        <h3>Document</h3>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px;">${file.original_filename}</div>
        <div style="font-size:11px;color:var(--text-dim);word-break:break-all;">${file.path}</div>
      </div>

      <div class="review-section" style="flex:1;overflow-y:auto;">
        <h3>Model Passes (${passes.length})</h3>
        ${passes.map((p, i) => `
          <div class="pass-card ${selectedPassValue === p.license_number ? 'selected' : ''}"
               onclick="selectPassValue('${(p.license_number || '').replace(/'/g, "\\'")}')">
            <div class="pass-model">
              <span>${p.model}</span>
              ${selectedPassValue === p.license_number ? '<span class="select-indicator">SELECTED</span>' : ''}
            </div>
            <div class="pass-row"><span>License #</span><span class="val mono">${p.license_number || 'null'}</span></div>
            <div class="pass-row"><span>Field</span><span class="val">${p.field_label || '-'}</span></div>
            <div class="pass-row"><span>Confidence</span><span class="val">${p.confidence != null ? p.confidence : '-'}</span></div>
            <div class="pass-row"><span>Time</span><span class="val">${p.inference_seconds != null ? p.inference_seconds + 's' : '-'}</span></div>
            ${p.error ? `<div class="pass-row"><span>Error</span><span class="val" style="color:var(--red)">${p.error}</span></div>` : ''}
          </div>
        `).join('')}
      </div>

      <div class="decision-area">
        <h3>Decision</h3>
        <div class="decision-input">
          <input type="text" id="decisionValue" placeholder="Enter or select license number"
                 value="${selectedPassValue || ''}"
                 onkeydown="if(event.key==='Enter')submitReview()">
        </div>
        ${uniqueValues.length > 0 ? `
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
            ${uniqueValues.map(v => `
              <button class="btn btn-sm ${selectedPassValue === v ? 'btn-success' : ''}"
                      onclick="selectPassValue('${v.replace(/'/g, "\\'")}')">${v}</button>
            `).join('')}
          </div>
        ` : ''}
        <div class="decision-actions">
          <button class="btn btn-success btn-lg" style="flex:1;" onclick="submitReview()">Accept & Next</button>
          <button class="btn btn-primary btn-sm" onclick="requeueAndNext()">Re-run</button>
          <button class="btn btn-sm" onclick="skipFile()">Skip</button>
        </div>
      </div>
    </div>
  `;
}

function selectPassValue(value) {
  selectedPassValue = value;
  document.getElementById('decisionValue').value = value;
  renderReview();
}

async function submitReview() {
  const value = document.getElementById('decisionValue').value.trim();
  if (!value) return alert('Please enter or select a value');

  const file = reviewFiles[currentIndex];

  await fetch('/api/review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: file.path, final_value: value }),
  });

  // Remove from local list and move to next
  reviewFiles.splice(currentIndex, 1);

  if (currentIndex >= reviewFiles.length) {
    currentIndex = reviewFiles.length - 1;
  }

  if (reviewFiles.length === 0) {
    currentIndex = -1;
    document.getElementById('reviewContent').innerHTML =
      '<div class="empty-state">All done! No more files to review.</div>';
  }

  renderFileList();
  updateCounter();
  if (currentIndex >= 0) renderReview();
}

async function requeueAndNext() {
  const file = reviewFiles[currentIndex];

  await fetch('/api/requeue-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: file.path }),
  });

  reviewFiles.splice(currentIndex, 1);

  if (currentIndex >= reviewFiles.length) {
    currentIndex = reviewFiles.length - 1;
  }

  if (reviewFiles.length === 0) {
    currentIndex = -1;
    document.getElementById('reviewContent').innerHTML =
      '<div class="empty-state">All done! No more files to review.</div>';
  }

  renderFileList();
  updateCounter();
  if (currentIndex >= 0) renderReview();
}

function skipFile() {
  nextFile();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'k') prevFile();
  if (e.key === 'ArrowRight' || e.key === 'j') nextFile();
});

loadReviewQueue();
</script>
</body>
</html>
