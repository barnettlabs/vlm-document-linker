<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Bench - Review Queue</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --orange: #fb923c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .header-actions a { color: var(--blue); text-decoration: none; font-size: 13px; }

  .review-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* File list sidebar */
  .file-list {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
  }

  .file-list-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .file-list-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-list-item:hover { background: var(--surface2); }
  .file-list-item.active { background: var(--surface2); border-left: 3px solid var(--blue); }
  .file-list-item .file-name { display: block; font-weight: 500; }

  .file-list-item .file-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 4px;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
  }

  .badge-review { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-type { background: rgba(96,165,250,0.15); color: var(--blue); }

  /* Main review area */
  .review-main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .review-image-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .page-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .page-nav button {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
  }

  .page-nav button:hover { background: var(--border); }
  .page-nav button:disabled { opacity: 0.3; cursor: default; }

  .review-image {
    flex: 1;
    padding: 20px;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .review-image img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
  }

  /* Review panel (right side) */
  .review-panel {
    width: 420px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .review-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .review-section h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* Pass cards */
  .pass-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .pass-card:hover { border-color: var(--blue); }
  .pass-card.selected { border-color: var(--green); background: rgba(52,211,153,0.05); }
  .pass-card.error-card { border-color: rgba(248,113,113,0.3); }

  .pass-card .pass-header {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pass-card .pass-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
    color: var(--text-dim);
  }

  .pass-card .pass-row .val { color: var(--text); }

  .pass-card .select-indicator {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }

  /* Extracted value highlight */
  .extracted-value {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--cyan);
  }

  /* Decision area */
  .decision-area {
    padding: 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .decision-area h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .decision-input {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .decision-input input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  .decision-input input:focus { outline: none; border-color: var(--blue); }

  .value-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .decision-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--border); }
  .btn-success { border-color: rgba(52,211,153,0.3); color: var(--green); background: rgba(52,211,153,0.1); }
  .btn-success:hover { background: rgba(52,211,153,0.2); }
  .btn-danger { border-color: rgba(248,113,113,0.3); color: var(--red); }
  .btn-danger:hover { background: rgba(248,113,113,0.15); }
  .btn-primary { border-color: rgba(96,165,250,0.3); color: var(--blue); }
  .btn-primary:hover { background: rgba(96,165,250,0.15); }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-lg { padding: 10px 20px; font-size: 14px; font-weight: 600; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-dim);
    font-size: 15px;
    padding: 40px;
    text-align: center;
  }

  .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }

  .nav-buttons { display: flex; gap: 8px; }

  .review-counter { color: var(--text-dim); font-size: 13px; }

  .confidence-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 4px;
  }

  .confidence-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.2s;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Review Queue</h1>
  <div class="header-actions">
    <span class="review-counter" id="reviewCounter">--</span>
    <div class="nav-buttons">
      <button class="btn btn-sm" onclick="prevFile()">Prev</button>
      <button class="btn btn-sm" onclick="nextFile()">Next</button>
    </div>
    <a href="/">Dashboard</a>
  </div>
</div>

<div class="review-layout">
  <div class="file-list">
    <div class="file-list-header">Files to Review</div>
    <div id="fileList"></div>
  </div>

  <div id="reviewContent" class="review-main">
    <div class="empty-state">Select a file from the list to begin review</div>
  </div>
</div>

<script>
let reviewFiles = [];
let currentIndex = -1;
let selectedValue = null;
let currentPage = 0;
let totalPages = 1;

async function loadReviewQueue() {
  try {
    const resp = await fetch('/api/review-queue');
    const result = await resp.json();
    reviewFiles = result.files || [];
    renderFileList();
    updateCounter();

    if (reviewFiles.length > 0 && currentIndex === -1) {
      selectFile(0);
    }
  } catch (e) {
    console.error('Failed to load review queue:', e);
  }
}

function updateCounter() {
  document.getElementById('reviewCounter').textContent =
    reviewFiles.length > 0 ? `${currentIndex + 1} / ${reviewFiles.length}` : 'No files to review';
}

function renderFileList() {
  const list = document.getElementById('fileList');

  if (reviewFiles.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px;">All clear! No files need review.</div>';
    return;
  }

  list.innerHTML = reviewFiles.map((f, i) => {
    const docType = (f.doc_type || '').replace(/_/g, ' ');
    return `
    <div class="file-list-item ${i === currentIndex ? 'active' : ''}" onclick="selectFile(${i})">
      <span class="file-name">${escapeHtml(f.original_filename)}</span>
      <div class="file-meta">
        <span class="badge badge-review">NEEDS REVIEW</span>
        ${docType ? `<span class="badge badge-type">${escapeHtml(docType)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selectFile(index) {
  currentIndex = index;
  selectedValue = null;
  currentPage = 0;

  // Determine page count from passes
  const file = reviewFiles[currentIndex];
  if (file) {
    const pages = file.passes ? file.passes.map(p => (p.page || 0) + 1) : [1];
    totalPages = Math.max(...pages, 1);
  } else {
    totalPages = 1;
  }

  renderFileList();
  updateCounter();
  renderReview();
}

function prevFile() {
  if (currentIndex > 0) selectFile(currentIndex - 1);
}

function nextFile() {
  if (currentIndex < reviewFiles.length - 1) selectFile(currentIndex + 1);
}

function setPage(page) {
  currentPage = page;
  renderReview();
}

function confidenceColor(c) {
  if (c >= 0.9) return 'var(--green)';
  if (c >= 0.7) return 'var(--yellow)';
  if (c >= 0.5) return 'var(--orange)';
  return 'var(--red)';
}

function renderReview() {
  const container = document.getElementById('reviewContent');
  const file = reviewFiles[currentIndex];

  if (!file) {
    container.innerHTML = '<div class="empty-state">Select a file from the list to begin review</div>';
    return;
  }

  const imgUrl = `/api/file-image?path=${encodeURIComponent(file.path)}&page=${currentPage}`;
  const passes = file.passes || [];

  // Collect unique extracted values from successful passes
  const uniqueValues = [...new Set(
    passes
      .filter(p => !p.error && p.found && p.certificate_number)
      .map(p => p.certificate_number)
  )];

  // Page nav HTML
  const pageNav = totalPages > 1 ? `
    <div class="page-nav">
      <button onclick="setPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>Prev</button>
      <span>Page ${currentPage + 1} of ${totalPages}</span>
      <button onclick="setPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next</button>
    </div>
  ` : '';

  container.innerHTML = `
    <div class="review-image-area">
      ${pageNav}
      <div class="review-image">
        <img src="${imgUrl}" alt="${escapeHtml(file.original_filename)}">
      </div>
    </div>
    <div class="review-panel">
      <div class="review-section">
        <h3>Document</h3>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px;">${escapeHtml(file.original_filename)}</div>
        <div style="font-size:11px;color:var(--text-dim);word-break:break-all;margin-bottom:6px;">${escapeHtml(file.path)}</div>
        <div style="display:flex;gap:6px;">
          ${file.doc_type ? `<span class="badge badge-type">${escapeHtml(file.doc_type.replace(/_/g, ' '))}</span>` : ''}
          ${totalPages > 1 ? `<span class="badge" style="background:rgba(162,139,250,0.15);color:var(--purple);">${totalPages} pages</span>` : ''}
        </div>
      </div>

      <div class="review-section" style="flex:1;overflow-y:auto;">
        <h3>Model Passes (${passes.length})</h3>
        ${passes.map((p, i) => renderPassCard(p, i)).join('')}
      </div>

      <div class="decision-area">
        <h3>Decision — Document ID</h3>
        <div class="decision-input">
          <input type="text" id="decisionValue"
                 placeholder="Enter or click a value above"
                 value="${escapeHtml(selectedValue || '')}"
                 onkeydown="if(event.key==='Enter')submitReview()">
        </div>
        ${uniqueValues.length > 0 ? `
          <div class="value-pills">
            ${uniqueValues.map(v => `
              <button class="btn btn-sm ${selectedValue === v ? 'btn-success' : ''}"
                      onclick="selectValue('${escapeHtml(v).replace(/'/g, "\\'")}')">${escapeHtml(v)}</button>
            `).join('')}
          </div>
        ` : ''}
        <div class="decision-actions">
          <button class="btn btn-success btn-lg" style="flex:1;" onclick="submitReview()">Accept & Next</button>
          <button class="btn btn-primary btn-sm" onclick="requeueAndNext()">Re-run</button>
          <button class="btn btn-sm" onclick="skipFile()">Skip</button>
        </div>
      </div>
    </div>
  `;
}

function renderPassCard(p, index) {
  const isError = !!p.error;
  const value = p.certificate_number;
  const isSelected = !isError && selectedValue === value && value != null;
  const pageLabel = totalPages > 1 ? ` (p${(p.page || 0) + 1})` : '';
  const conf = p.confidence;

  if (isError) {
    return `
      <div class="pass-card error-card">
        <div class="pass-header">
          <span>${escapeHtml(p.model || 'unknown')}${pageLabel}</span>
          <span style="font-size:11px;color:var(--red);">ERROR</span>
        </div>
        <div class="pass-row"><span>Error</span><span class="val" style="color:var(--red);font-size:11px;">${escapeHtml(p.error)}</span></div>
      </div>`;
  }

  return `
    <div class="pass-card ${isSelected ? 'selected' : ''}"
         onclick="selectValue(${value != null ? "'" + escapeHtml(String(value)).replace(/'/g, "\\'") + "'" : 'null'})">
      <div class="pass-header">
        <span>${escapeHtml(p.model || 'unknown')}${pageLabel}</span>
        ${isSelected ? '<span class="select-indicator">SELECTED</span>' : ''}
      </div>
      <div class="pass-row">
        <span>Value</span>
        <span class="val extracted-value">${value != null ? escapeHtml(String(value)) : '<span style="color:var(--text-dim);font-style:italic;">not found</span>'}</span>
      </div>
      <div class="pass-row">
        <span>Found</span>
        <span class="val" style="color:${p.found ? 'var(--green)' : 'var(--red)'};">${p.found ? 'Yes' : 'No'}</span>
      </div>
      ${conf != null ? `
        <div class="pass-row">
          <span>Confidence</span>
          <span class="val" style="color:${confidenceColor(conf)}">${conf}</span>
        </div>
        <div class="confidence-bar">
          <div class="confidence-bar-fill" style="width:${Math.round(conf * 100)}%;background:${confidenceColor(conf)};"></div>
        </div>
      ` : ''}
      ${p.inference_seconds != null ? `
        <div class="pass-row"><span>Time</span><span class="val">${p.inference_seconds}s</span></div>
      ` : ''}
      ${p.prompt_tokens ? `
        <div class="pass-row"><span>Tokens</span><span class="val">${(p.prompt_tokens || 0).toLocaleString()} in / ${(p.completion_tokens || 0).toLocaleString()} out</span></div>
      ` : ''}
    </div>`;
}

function selectValue(value) {
  if (value == null) return;
  selectedValue = String(value);
  const input = document.getElementById('decisionValue');
  if (input) input.value = selectedValue;
  renderReview();
}

async function submitReview() {
  const input = document.getElementById('decisionValue');
  const value = input ? input.value.trim() : '';
  if (!value) return alert('Please enter or select a value');

  const file = reviewFiles[currentIndex];

  await fetch('/api/review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: file.path, document_id: value }),
  });

  removeCurrentAndAdvance();
}

async function requeueAndNext() {
  const file = reviewFiles[currentIndex];

  await fetch('/api/requeue-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: file.path }),
  });

  removeCurrentAndAdvance();
}

function skipFile() {
  nextFile();
}

function removeCurrentAndAdvance() {
  reviewFiles.splice(currentIndex, 1);

  if (reviewFiles.length === 0) {
    currentIndex = -1;
    document.getElementById('reviewContent').innerHTML =
      '<div class="empty-state">All done! No more files to review.</div>';
  } else {
    if (currentIndex >= reviewFiles.length) {
      currentIndex = reviewFiles.length - 1;
    }
    renderReview();
  }

  renderFileList();
  updateCounter();
}

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'k') prevFile();
  if (e.key === 'ArrowRight' || e.key === 'j') nextFile();
});

loadReviewQueue();
</script>
</body>
</html>
